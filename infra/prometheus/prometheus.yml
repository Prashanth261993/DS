# Prometheus scrape config for the FluxTape local stack.
# Add service jobs as we build them in later phases.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]

  # Ingestion service runs on the host during dev; reach it from the Prometheus
  # container via host.docker.internal. (When containerized, use "ingestion:9100".)
  - job_name: ingestion
    static_configs:
      - targets: ["host.docker.internal:9100"]

  # --- Phase 2+: uncomment as services come online ---
  - job_name: stream-processor # Go stream processor
    static_configs:
      - targets: ["host.docker.internal:9101"]
  - job_name: bar-sink
    static_configs:
      - targets: ["host.docker.internal:9102"]
  - job_name: trade-sink
    static_configs:
      - targets: ["host.docker.internal:9103"]
  # - job_name: api-gateway      # Go API gateway
  #   static_configs:
  #     - targets: ["api-gateway:9102"]
