apiVersion: 1

providers:
  - name: FluxTape
    orgId: 1
    folder: FluxTape
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      # Dashboards live in the json/ subfolder so this provider yaml isn't scanned.
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
