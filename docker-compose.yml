# FluxTape local infrastructure stack (Phase 0)
#
# Brings up every backing service the platform needs, locally:
#   - Redpanda        : Kafka-API event backbone (pub/sub log)
#   - Redpanda Console: web UI to inspect topics/messages
#   - TimescaleDB     : Postgres + time-series (hot store AND source of truth in dev)
#   - Redis           : cache + pub/sub fanout
#   - Prometheus      : metrics scraping
#   - Grafana         : dashboards
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
#   docker compose ps
#   docker compose down            (add -v to wipe data volumes)

name: fluxtape

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: fluxtape-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Two listeners: 'internal' for containers, 'external' for your host apps.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "19092:19092"   # Kafka API (connect your local Go/Rust apps here)
      - "9644:9644"     # Admin/metrics (Prometheus scrapes this)
      - "8082:8082"     # HTTP proxy
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks: [fluxtape]

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: fluxtape-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"     # http://localhost:8080  — inspect topics/messages
    networks: [fluxtape]

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: fluxtape-timescaledb
    # wal_level=logical pre-enables Change Data Capture (Phase 5) — no restart later.
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluxtape}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxtape}
      POSTGRES_DB: ${POSTGRES_DB:-fluxtape}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fluxtape}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - timescale-data:/var/lib/postgresql/data
    networks: [fluxtape]

  redis:
    image: redis:7.4-alpine
    container_name: fluxtape-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    networks: [fluxtape]

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: fluxtape-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [fluxtape]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fluxtape-grafana
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports:
      - "3000:3000"     # http://localhost:3000
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [fluxtape]

networks:
  fluxtape:
    driver: bridge

volumes:
  redpanda-data:
  timescale-data:
  redis-data:
  prometheus-data:
  grafana-data:
